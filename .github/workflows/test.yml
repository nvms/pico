name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: npm ci
      - run: npm test
      - run: npm run build
